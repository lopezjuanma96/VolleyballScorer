# volumes:

services:
  app:
    build:
      context: backend
    container_name: volleyball_scorer_app
    environment:
      - PSQL_HOST=db
      - PSQL_PORT=${PSQL_PORT}
      - PSQL_DATABASE=${PSQL_DATABASE}
      - PSQL_USER=${PSQL_USER}
      - PSQL_PASSWORD=${PSQL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: volleyball_scorer_nginx
    ports:
      - 80:80
    volumes:
      # Option A: replace the entire nginx.conf (requires events {} and http {} wrappers in the file)
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      # Option B: only override the server block, letting the default nginx.conf handle the http {} wrapper
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    # environment:
    depends_on:
      - app

  ngrok:
    image: ngrok/ngrok
    container_name: volleyball_scorer_ngrok
    volumes:
      - ./ngrok/ngrok.yml:/etc/ngrok/ngrok.yml
    ports:
      - 4040:4040
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN} 
    command: "start --all --config /etc/ngrok/ngrok.yml"
    depends_on:
      - nginx

  db:
    image: postgres
    container_name: volleyball_scorer_db
    volumes:
      - ./db/db_data/:/var/lib/postgresql/
      - ./db/db_init/psql/:/docker-entrypoint-initdb.d/ # from what I understand I can use this to run init commands like creating the read/write users.
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=${PSQL_DATABASE}
      - POSTGRES_USER=${PSQL_ADMIN_USER}
      - POSTGRES_PASSWORD=${PSQL_ADMIN_PASSWORD}
      - POSTGRES_NEW_USER=${PSQL_USER}
      - POSTGRES_NEW_PASSWORD=${PSQL_PASSWORD}
    healthcheck: # found this in one example
      test: [ "CMD", "pg_isready", "-U", "${PSQL_ADMIN_USER}", "-d", "${PSQL_DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5


